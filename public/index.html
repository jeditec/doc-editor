<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Doc Editor</title>
  <style>
    /* === Themes === */
    
    /* Tokyo Night */
    [data-theme="tokyo-night"] {
      --bg: #1a1b26;
      --bg-sidebar: #16161e;
      --bg-hover: #24283b;
      --bg-active: #292e42;
      --bg-input: #1a1b26;
      --text: #c0caf5;
      --text-dim: #565f89;
      --text-bright: #a9b1d6;
      --accent: #7aa2f7;
      --accent-dim: #3d59a1;
      --danger: #f7768e;
      --border: #292e42;
      --scrollbar: #292e42;
      --scrollbar-hover: #414868;
      --success: #9ece6a;
    }
    
    /* Nord */
    [data-theme="nord"] {
      --bg: #2e3440;
      --bg-sidebar: #2e3440;
      --bg-hover: #3b4252;
      --bg-active: #434c5e;
      --bg-input: #3b4252;
      --text: #d8dee9;
      --text-dim: #4c566a;
      --text-bright: #e5e9f0;
      --accent: #88c0d0;
      --accent-dim: #4c566a;
      --danger: #bf616a;
      --border: #434c5e;
      --scrollbar: #434c5e;
      --scrollbar-hover: #4c566a;
      --success: #a3be8c;
    }
    
    /* Dracula */
    [data-theme="dracula"] {
      --bg: #282a36;
      --bg-sidebar: #282a36;
      --bg-hover: #44475a;
      --bg-active: #6272a4;
      --bg-input: #44475a;
      --text: #f8f8f2;
      --text-dim: #6272a4;
      --text-bright: #e5e9f0;
      --accent: #bd93f9;
      --accent-dim: #44475a;
      --danger: #ff5555;
      --border: #44475a;
      --scrollbar: #44475a;
      --scrollbar-hover: #6272a4;
      --success: #50fa7b;
    }
    
    /* Solarized Dark */
    [data-theme="solarized-dark"] {
      --bg: #002b36;
      --bg-sidebar: #002b36;
      --bg-hover: #073642;
      --bg-active: #064f6a;
      --bg-input: #073642;
      --text: #839496;
      --text-dim: #586e75;
      --text-bright: #93a1a1;
      --accent: #268bd2;
      --accent-dim: #073642;
      --danger: #dc322f;
      --border: #073642;
      --scrollbar: #073642;
      --scrollbar-hover: #064f6a;
      --success: #859900;
    }
    
    /* Catppuccin Mocha */
    [data-theme="catppuccin-mocha"] {
      --bg: #1e1e2e;
      --bg-sidebar: #181825;
      --bg-hover: #313244;
      --bg-active: #45475a;
      --bg-input: #1e1e2e;
      --text: #cdd6f4;
      --text-dim: #6c7086;
      --text-bright: #bac2de;
      --accent: #89b4fa;
      --accent-dim: #313244;
      --danger: #f38ba8;
      --border: #45475a;
      --scrollbar: #45475a;
      --scrollbar-hover: #585b70;
      --success: #a6e3a1;
    }
    
    /* One Dark */
    [data-theme="one-dark"] {
      --bg: #282c34;
      --bg-sidebar: #21252b;
      --bg-hover: #353b45;
      --bg-active: #3e4451;
      --bg-input: #282c34;
      --text: #abb2bf;
      --text-dim: #5c6370;
      --text-bright: #e5e9f0;
      --accent: #61afef;
      --accent-dim: #3e4451;
      --danger: #e06c75;
      --border: #3e4451;
      --scrollbar: #3e4451;
      --scrollbar-hover: #5c6370;
      --success: #98c379;
    }
    
    /* Gruvbox Dark */
    [data-theme="gruvbox-dark"] {
      --bg: #282828;
      --bg-sidebar: #282828;
      --bg-hover: #3c3836;
      --bg-active: #504945;
      --bg-input: #32302f;
      --text: #d5c4a1;
      --text-dim: #7c6f64;
      --text-bright: #ebdbb2;
      --accent: #83a598;
      --accent-dim: #3c3836;
      --danger: #fb4934;
      --border: #504945;
      --scrollbar: #504945;
      --scrollbar-hover: #665c54;
      --success: #b8bb26;
    }
    
    /* Monokai Pro */
    [data-theme="monokai-pro"] {
      --bg: #2d2a2e;
      --bg-sidebar: #29262a;
      --bg-hover: #403e41;
      --bg-active: #524f52;
      --bg-input: #2d2a2e;
      --text: #fcfcfa;
      --text-dim: #727072;
      --text-bright: #e5e5e5;
      --accent: #ff6188;
      --accent-dim: #403e41;
      --danger: #ff6188;
      --border: #524f52;
      --scrollbar: #524f52;
      --scrollbar-hover: #727072;
      --success: #a9dc76;
    }
    
    /* Synthwave '84 */
    [data-theme="synthwave"] {
      --bg: #262335;
      --bg-sidebar: #241b2f;
      --bg-hover: #372d4c;
      --bg-active: #4b3c6d;
      --bg-input: #262335;
      --text: #cacaec;
      --text-dim: #685e7a;
      --text-bright: #f28779;
      --accent: #f97e72;
      --accent-dim: #372d4c;
      --danger: #f97e72;
      --border: #4b3c6d;
      --scrollbar: #4b3c6d;
      --scrollbar-hover: #685e7a;
      --success: #73fbb2;
    }
    
    /* GitHub Dark */
    [data-theme="github-dark"] {
      --bg: #0d1117;
      --bg-sidebar: #010409;
      --bg-hover: #161b22;
      --bg-active: #21262d;
      --bg-input: #0d1117;
      --text: #c9d1d9;
      --text-dim: #484f58;
      --text-bright: #e6edf3;
      --accent: #58a6ff;
      --accent-dim: #21262d;
      --danger: #f85149;
      --border: #21262d;
      --scrollbar: #21262d;
      --scrollbar-hover: #30363d;
      --success: #3fb950;
    }
    
    /* Oceanic Next */
    [data-theme="oceanic-next"] {
      --bg: #1b2b34;
      --bg-sidebar: #16232a;
      --bg-hover: #343d46;
      --bg-active: #4f5b66;
      --bg-input: #1b2b34;
      --text: #d3c6aa;
      --text-dim: #5f7e97;
      --text-bright: #ecdfcf;
      --accent: #6699cc;
      --accent-dim: #343d46;
      --danger: #ff6c6b;
      --border: #343d46;
      --scrollbar: #343d46;
      --scrollbar-hover: #4f5b66;
      --success: #99b2ff;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
    }

    /* Layout */
    .app { display: flex; height: 100vh; }

    /* Sidebar */
    .sidebar {
      width: 320px;
      min-width: 320px;
      background: var(--bg-sidebar);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      transition: margin-left 0.3s ease;
    }
    .sidebar.collapsed { margin-left: -320px; }

    .sidebar-header {
      padding: 20px;
      border-bottom: 1px solid var(--border);
    }
    .sidebar-header h1 {
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--accent);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .search-box {
      margin-top: 12px;
      position: relative;
    }
    .search-box input {
      width: 100%;
      padding: 10px 14px 10px 36px;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 0.85rem;
      outline: none;
      transition: border-color 0.2s;
    }
    .search-box input:focus { border-color: var(--accent); }
    .search-box::before {
      content: '🔍';
      position: absolute;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 0.85rem;
    }

    .sidebar-actions {
      padding: 12px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .btn {
      padding: 8px 14px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--bg-input);
      color: var(--text);
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
    }
    .btn:hover { background: var(--bg-hover); border-color: var(--accent); }
    .btn-accent {
      background: var(--accent-dim);
      border-color: var(--accent);
      color: #fff;
    }
    .btn-accent:hover { background: var(--accent); }
    .btn-danger { border-color: var(--danger); color: var(--danger); }
    .btn-danger:hover { background: var(--danger); color: #fff; }
    .btn-sm { padding: 5px 10px; font-size: 0.75rem; }

    .category-filters {
      padding: 12px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .cat-tag {
      padding: 4px 10px;
      border-radius: 12px;
      font-size: 0.72rem;
      background: var(--bg-input);
      border: 1px solid var(--border);
      color: var(--text-dim);
      cursor: pointer;
      transition: all 0.2s;
    }
    .cat-tag:hover, .cat-tag.active {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-dim);
    }

    .doc-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }
    .doc-list::-webkit-scrollbar { width: 6px; }
    .doc-list::-webkit-scrollbar-track { background: transparent; }
    .doc-list::-webkit-scrollbar-thumb {
      background: var(--scrollbar);
      border-radius: 3px;
    }
    .doc-list::-webkit-scrollbar-thumb:hover { background: var(--scrollbar-hover); }

    .doc-item {
      padding: 12px 14px;
      border-radius: var(--radius);
      cursor: pointer;
      transition: all 0.15s;
      border: 1px solid transparent;
      margin-bottom: 4px;
    }
    .doc-item:hover { background: var(--bg-hover); }
    .doc-item.active {
      background: var(--bg-active);
      border-color: var(--accent);
    }
    .doc-item-title {
      font-size: 0.88rem;
      font-weight: 600;
      color: var(--text-bright);
      margin-bottom: 3px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .doc-item-meta {
      font-size: 0.7rem;
      color: var(--text-dim);
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .doc-item-cat {
      padding: 1px 6px;
      border-radius: 8px;
      background: var(--bg);
      font-size: 0.65rem;
    }
    .doc-item-preview {
      font-size: 0.75rem;
      color: var(--text-dim);
      margin-top: 4px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      line-height: 1.4;
    }

    /* Main area */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    .toolbar {
      padding: 12px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .toolbar-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .toolbar-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .title-input {
      background: transparent;
      border: none;
      color: var(--text-bright);
      font-size: 1.1rem;
      font-weight: 700;
      outline: none;
      flex: 1;
      max-width: 500px;
      font-family: var(--sans);
    }
    .title-input::placeholder { color: var(--text-dim); }

    .category-select, .theme-select {
      padding: 6px 10px;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 0.8rem;
      outline: none;
      cursor: pointer;
    }
    .category-select:focus, .theme-select:focus { border-color: var(--accent); }

    .meta-info {
      font-size: 0.7rem;
      color: var(--text-dim);
      white-space: nowrap;
    }

    .char-count {
      font-size: 0.7rem;
      color: var(--text-dim);
      min-width: 60px;
      text-align: right;
    }

    .editor-area {
      flex: 1;
      padding: 24px;
      overflow: hidden;
    }
    .editor-textarea {
      width: 100%;
      height: 100%;
      background: transparent;
      border: none;
      color: var(--text);
      font-family: var(--font);
      font-size: 0.92rem;
      line-height: 1.7;
      resize: none;
      outline: none;
      tab-size: 2;
    }
    .editor-textarea::placeholder { color: var(--text-dim); }

    /* Welcome screen */
    .welcome {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--text-dim);
      text-align: center;
      padding: 40px;
    }
    .welcome h2 {
      font-size: 1.5rem;
      color: var(--text-bright);
      margin-bottom: 12px;
    }
    .welcome p {
      font-size: 0.9rem;
      line-height: 1.6;
      max-width: 400px;
    }
    .welcome .shortcut {
      margin-top: 24px;
      font-size: 0.78rem;
      color: var(--text-dim);
    }
    .welcome kbd {
      padding: 2px 8px;
      background: var(--bg-active);
      border-radius: 4px;
      font-family: var(--font);
      font-size: 0.75rem;
      border: 1px solid var(--border);
    }

    /* Save indicator */
    .save-status {
      font-size: 0.72rem;
      padding: 2px 8px;
      border-radius: 10px;
      transition: all 0.3s;
    }
    .save-status.saving { background: var(--accent-dim); color: #fff; }
    .save-status.saved { background: var(--success); color: #1a1b26; }
    .save-status.unsaved { color: var(--danger); }

    /* Modal */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }
    .modal-overlay.show { display: flex; }
    .modal {
      background: var(--bg-sidebar);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
      width: 400px;
      max-width: 90vw;
    }
    .modal h3 {
      margin-bottom: 16px;
      color: var(--text-bright);
    }
    .modal input, .modal select {
      width: 100%;
      padding: 10px 14px;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 0.85rem;
      outline: none;
      margin-bottom: 12px;
    }
    .modal input:focus, .modal select:focus { border-color: var(--accent); }
    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 8px;
    }

    /* Toggle sidebar button */
    .toggle-sidebar {
      background: var(--bg-input);
      border: 1px solid var(--border);
      color: var(--text-dim);
      padding: 6px 10px;
      border-radius: var(--radius);
      cursor: pointer;
      font-size: 0.9rem;
      transition: all 0.2s;
    }
    .toggle-sidebar:hover { color: var(--accent); border-color: var(--accent); }

    /* Export button */
    .export-btn {
      position: fixed;
      bottom: 20px;
      right: 20px;
      z-index: 10;
      opacity: 0.7;
      transition: opacity 0.2s;
    }
    .export-btn:hover { opacity: 1; }

    /* Responsive */
    @media (max-width: 768px) {
      .sidebar { width: 280px; min-width: 280px; position: absolute; z-index: 50; height: 100%; }
      .sidebar.collapsed { margin-left: -280px; }
      .title-input { max-width: 200px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <h1>📝 Doc Editor</h1>
        <div class="search-box">
          <input type="text" id="searchInput" placeholder="Search documents..." />
        </div>
      </div>
      <div class="sidebar-actions">
        <button class="btn btn-accent" onclick="createDoc()">＋ New Doc</button>
        <button class="btn btn-sm" onclick="exportDocs()">📦 Export</button>
      </div>
      <div class="category-filters" id="categoryFilters"></div>
      <div class="doc-list" id="docList"></div>
    </aside>

    <!-- Main -->
    <main class="main">
      <!-- Welcome screen -->
      <div class="welcome" id="welcome">
        <h2>Welcome to Doc Editor</h2>
        <p>A simple, local-first text editor. Your documents are saved in a SQLite database — no cloud, no tracking.</p>
        <div class="shortcut">
          Click <kbd>New Doc</kbd> to get started
        </div>
      </div>

      <!-- Editor (hidden initially) -->
      <div style="display:none; flex-direction:column; flex:1; overflow:hidden;" id="editorContainer">
        <div class="toolbar">
          <div class="toolbar-left">
            <button class="toggle-sidebar" onclick="toggleSidebar()" title="Toggle sidebar">☰</button>
            <input type="text" class="title-input" id="titleInput" placeholder="Document title..." />
            <select class="category-select" id="categorySelect">
              <option value="general">General</option>
              <option value="notes">Notes</option>
              <option value="work">Work</option>
              <option value="personal">Personal</option>
              <option value="ideas">Ideas</option>
              <option value="code">Code</option>
              <option value="writing">Writing</option>
              <option value="other">Other</option>
            </select>
            <select class="theme-select" id="themeSelect" onchange="changeTheme(this.value)">
              <option value="tokyo-night">🌙 Tokyo Night</option>
              <option value="nord">❄️ Nord</option>
              <option value="dracula">🧛 Dracula</option>
              <option value="solarized-dark">🌊 Solarized Dark</option>
              <option value="catppuccin-mocha">☕ Catppuccin</option>
              <option value="one-dark">⚛️ One Dark</option>
              <option value="gruvbox-dark">🟧 Gruvbox</option>
              <option value="monokai-pro">🎨 Monokai Pro</option>
              <option value="synthwave">🌆 Synthwave</option>
              <option value="github-dark">🐙 GitHub Dark</option>
              <option value="oceanic-next">🌊 Oceanic Next</option>
            </select>
          </div>
          <div class="toolbar-right">
            <span class="save-status" id="saveStatus">—</span>
            <span class="meta-info" id="metaInfo"></span>
            <span class="char-count" id="charCount"></span>
            <button class="btn btn-sm" onclick="saveDoc()">💾 Save</button>
            <button class="btn btn-sm btn-danger" onclick="deleteDoc()">🗑️</button>
          </div>
        </div>
        <div class="editor-area">
          <textarea class="editor-textarea" id="contentArea" placeholder="Start writing..."></textarea>
        </div>
      </div>
    </main>
  </div>

  <!-- Confirm delete modal -->
  <div class="modal-overlay" id="deleteModal">
    <div class="modal">
      <h3>Delete Document?</h3>
      <p style="color:var(--text-dim); font-size:0.85rem; margin-bottom:16px;">This action cannot be undone.</p>
      <div class="modal-actions">
        <button class="btn" onclick="closeDeleteModal()">Cancel</button>
        <button class="btn btn-danger" onclick="confirmDelete()">Delete</button>
      </div>
    </div>
  </div>

  <script>
    let documents = [];
    let currentDoc = null;
    let activeCategory = 'all';
    let saveTimeout = null;
    let docIdCounter = 0;

    // ---- Theme Management ----
    function changeTheme(themeName) {
      document.documentElement.setAttribute('data-theme', themeName);
      localStorage.setItem('doc-editor-theme', themeName);
    }

    function initTheme() {
      const saved = localStorage.getItem('doc-editor-theme') || 'tokyo-night';
      document.documentElement.setAttribute('data-theme', saved);
      document.getElementById('themeSelect').value = saved;
    }

    // ---- Data ----
    async function fetchDocs() {
      const params = new URLSearchParams();
      if (activeCategory !== 'all') params.set('category', activeCategory);
      const search = document.getElementById('searchInput').value;
      if (search) params.set('search', search);

      const res = await fetch(`/api/documents?${params}`);
      documents = await res.json();
      renderDocList();
    }

    async function fetchCategories() {
      const res = await fetch('/api/categories');
      const cats = await res.json();
      const container = document.getElementById('categoryFilters');
      container.innerHTML = `<span class="cat-tag ${activeCategory === 'all' ? 'active' : ''}" onclick="filterCategory('all')">All</span>`;
      for (const cat of cats) {
        container.innerHTML += `<span class="cat-tag ${activeCategory === cat ? 'active' : ''}" onclick="filterCategory('${cat}')">${cat}</span>`;
      }
    }

    // ---- Rendering ----
    function renderDocList() {
      const list = document.getElementById('docList');
      if (documents.length === 0) {
        list.innerHTML = `<div style="padding:20px; text-align:center; color:var(--text-dim); font-size:0.82rem;">
          ${documents.length === 0 && activeCategory === 'all' ? 'No documents yet.<br>Create one with <b>+ New Doc</b>' : 'No documents in this category.'}
        </div>`;
        return;
      }
      list.innerHTML = documents.map(doc => {
        const preview = doc.content.substring(0, 80).replace(/\n/g, ' ');
        const date = new Date(doc.updated_at).toLocaleDateString('en-US', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
        const isActive = currentDoc && currentDoc.id === doc.id;
        return `
          <div class="doc-item ${isActive ? 'active' : ''}" onclick="openDoc(${doc.id})">
            <div class="doc-item-title">${escapeHtml(doc.title)}</div>
            <div class="doc-item-meta">
              <span>${date}</span>
              <span class="doc-item-cat">${escapeHtml(doc.category || 'general')}</span>
            </div>
            <div class="doc-item-preview">${escapeHtml(preview)}</div>
          </div>
        `;
      }).join('');
    }

    // ---- Actions ----
    async function createDoc() {
      const res = await fetch('/api/documents', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          title: 'Untitled Document',
          content: '',
          category: activeCategory !== 'all' ? activeCategory : 'general'
        })
      });
      const doc = await res.json();
      await fetchDocs();
      openDoc(doc.id);
    }

    function openDoc(id) {
      const doc = documents.find(d => d.id === id);
      if (!doc) return;
      currentDoc = doc;
      document.getElementById('welcome').style.display = 'none';
      const editor = document.getElementById('editorContainer');
      editor.style.display = 'flex';

      document.getElementById('titleInput').value = doc.title;
      document.getElementById('contentArea').value = doc.content;
      document.getElementById('categorySelect').value = doc.category || 'general';
      document.getElementById('charCount').textContent = `${doc.content.length} chars`;
      document.getElementById('saveStatus').textContent = '✓ saved';
      document.getElementById('saveStatus').className = 'save-status saved';
      const date = new Date(doc.updated_at).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
      document.getElementById('metaInfo').textContent = date;

      renderDocList();
      document.getElementById('contentArea').focus();
    }

    async function saveDoc() {
      if (!currentDoc) return;
      const title = document.getElementById('titleInput').value;
      const content = document.getElementById('contentArea').value;
      const category = document.getElementById('categorySelect').value;

      document.getElementById('saveStatus').textContent = 'saving...';
      document.getElementById('saveStatus').className = 'save-status saving';

      await fetch(`/api/documents/${currentDoc.id}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ title, content, category })
      });

      currentDoc.title = title;
      currentDoc.content = content;
      currentDoc.category = category;
      currentDoc.updated_at = new Date().toISOString();

      document.getElementById('saveStatus').textContent = '✓ saved';
      document.getElementById('saveStatus').className = 'save-status saved';
      document.getElementById('charCount').textContent = `${content.length} chars`;
      renderDocList();

      setTimeout(() => {
        document.getElementById('saveStatus').textContent = '—';
        document.getElementById('saveStatus').className = 'save-status';
      }, 2000);
    }

    function autoSave() {
      document.getElementById('saveStatus').textContent = '●';
      document.getElementById('saveStatus').className = 'save-status unsaved';
      clearTimeout(saveTimeout);
      saveTimeout = setTimeout(saveDoc, 1000);
    }

    function deleteDoc() {
      document.getElementById('deleteModal').classList.add('show');
    }

    function closeDeleteModal() {
      document.getElementById('deleteModal').classList.remove('show');
    }

    async function confirmDelete() {
      if (!currentDoc) return;
      await fetch(`/api/documents/${currentDoc.id}`, { method: 'DELETE' });
      currentDoc = null;
      document.getElementById('editorContainer').style.display = 'none';
      document.getElementById('welcome').style.display = 'flex';
      closeDeleteModal();
      await fetchDocs();
    }

    function filterCategory(cat) {
      activeCategory = cat;
      fetchDocs();
      fetchCategories();
    }

    function toggleSidebar() {
      document.getElementById('sidebar').classList.toggle('collapsed');
    }

    async function exportDocs() {
      const res = await fetch('/api/export');
      const docs = await res.json();
      const blob = new Blob([JSON.stringify(docs, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `doc-editor-backup-${new Date().toISOString().split('T')[0]}.json`;
      a.click();
      URL.revokeObjectURL(url);
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // ---- Events ----
    document.getElementById('titleInput').addEventListener('input', autoSave);
    document.getElementById('contentArea').addEventListener('input', () => {
      autoSave();
      document.getElementById('charCount').textContent = `${document.getElementById('contentArea').value.length} chars`;
    });
    document.getElementById('searchInput').addEventListener('input', () => {
      fetchDocs();
    });
    document.getElementById('deleteModal').addEventListener('click', (e) => {
      if (e.target === document.getElementById('deleteModal')) closeDeleteModal();
    });

    // Keyboard shortcuts
    document.addEventListener('keydown', (e) => {
      if ((e.ctrlKey || e.metaKey) && e.key === 's') {
        e.preventDefault();
        saveDoc();
      }
      if ((e.ctrlKey || e.metaKey) && e.key === 'n') {
        e.preventDefault();
        createDoc();
      }
      if ((e.ctrlKey || e.metaKey) && e.key === 'b') {
        e.preventDefault();
        toggleSidebar();
      }
    });

    // ---- Init ----
    initTheme();
    fetchDocs();
    fetchCategories();
  </script>
</body>
</html>
