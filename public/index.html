      --text: #353a40; --text-dim: #708090; --text-bright: #24292f;
      --accent: #4078f2; --accent-dim: #c8c8c8; --danger: #ff5555;

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
    }

    /* Layout */
    .app { display: flex; height: 100vh; }

    /* Sidebar */
    .sidebar {
      width: 320px;
      min-width: 320px;
      background: var(--bg-sidebar);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      transition: margin-left 0.3s ease;
    }
    .sidebar.collapsed { margin-left: -320px; }

    .sidebar-header {
      padding: 20px;
      border-bottom: 1px solid var(--border);
    }
    .sidebar-header h1 {
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--accent);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .search-box {
      margin-top: 12px;
      position: relative;
    }
    .search-box input {
      width: 100%;
      padding: 10px 14px 10px 36px;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 0.85rem;
      outline: none;
      transition: border-color 0.2s;
    }
    .search-box input:focus { border-color: var(--accent); }
    .search-box::before {
      content: '🔍';
      position: absolute;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 0.85rem;
    }

    .sidebar-actions {
      padding: 12px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .sidebar-actions .btn-flex {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .btn {
      padding: 8px 14px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--bg-input);
      color: var(--text);
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
    }
    .btn:hover { background: var(--bg-hover); border-color: var(--accent); }
    .btn-accent {
      background: var(--accent-dim);
      border-color: var(--accent);
      color: #fff;
    }
    .btn-accent:hover { background: var(--accent); }
    .btn-danger { border-color: var(--danger); color: var(--danger); }
    .btn-danger:hover { background: var(--danger); color: #fff; }
    .btn-sm { padding: 5px 10px; font-size: 0.75rem; }

    .category-filters {
      padding: 12px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .cat-tag {
      padding: 4px 10px;
      border-radius: 12px;
      font-size: 0.72rem;
      background: var(--bg-input);
      border: 1px solid var(--border);
      color: var(--text-dim);
      cursor: pointer;
      transition: all 0.2s;
    }
    .cat-tag:hover, .cat-tag.active {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-dim);
    }

    .doc-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }
    .doc-list::-webkit-scrollbar { width: 6px; }
    .doc-list::-webkit-scrollbar-track { background: transparent; }
    .doc-list::-webkit-scrollbar-thumb {
      background: var(--scrollbar);
      border-radius: 3px;
    }
    .doc-list::-webkit-scrollbar-thumb:hover { background: var(--scrollbar-hover); }

    .doc-item {
      padding: 12px 14px;
      border-radius: var(--radius);
      cursor: pointer;
      transition: all 0.15s;
      border: 1px solid transparent;
      margin-bottom: 4px;
      position: relative;
    }
    .doc-item:hover { background: var(--bg-hover); }
    .doc-item.active {
      background: var(--bg-active);
      border-color: var(--accent);
    }
    .doc-item-wrapper {
      display: flex;
      align-items: center;
      gap: 8px;
      width: 100%;
    }
    .doc-item-info {
      flex: 1;
      min-width: 0;
    }
    .doc-item-title {
      font-size: 0.88rem;
      font-weight: 600;
      color: var(--text-bright);
      margin-bottom: 3px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .doc-item-delete {
      opacity: 1;
      background: none;
      border: none;
      color: var(--danger);
      cursor: pointer;
      font-size: 0.85rem;
      padding: 4px 6px;
      border-radius: 4px;
      transition: all 0.15s;
      flex-shrink: 0;
    }
    .doc-item-delete:hover {
      background: var(--danger);
      color: var(--bg);
    }
    .doc-item-meta {
      font-size: 0.7rem;
      color: var(--text-dim);
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .doc-item-cat {
      padding: 1px 6px;
      border-radius: 8px;
      background: var(--bg);
      font-size: 0.65rem;
    }
    .doc-item-preview {
      font-size: 0.75rem;
      color: var(--text-dim);
      margin-top: 4px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      line-height: 1.4;
    }

    /* Main area */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    .toolbar {
      padding: 12px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }
    .toolbar-left {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    .toolbar-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .title-input {
      background: transparent;
      border: none;
      color: var(--text-bright);
      font-size: 1.1rem;
      font-weight: 700;
      outline: none;
      flex: 1;
      min-width: 150px;
      max-width: 500px;
      font-family: var(--sans);
    }
    .title-input::placeholder { color: var(--text-dim); }

    .category-select, .theme-select {
      padding: 6px 10px;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 0.8rem;
      outline: none;
      cursor: pointer;
    }
    .category-select:focus, .theme-select:focus { border-color: var(--accent); }

    .meta-info {
      font-size: 0.7rem;
      color: var(--text-dim);
      white-space: nowrap;
    }

    .char-count {
      font-size: 0.7rem;
      color: var(--text-dim);
      min-width: 60px;
      text-align: right;
    }

    .editor-area {
      flex: 1;
      padding: 24px;
      overflow: hidden;
    }
    .editor-textarea {
      width: 100%;
      height: 100%;
      background: transparent;
      border: none;
      color: var(--text);
      font-family: var(--font);
      font-size: 0.92rem;
      line-height: 1.7;
      resize: none;
      outline: none;
      tab-size: 2;
    }
    .editor-textarea::placeholder { color: var(--text-dim); }

    /* Welcome screen */
    .welcome {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--text-dim);
      text-align: center;
      padding: 40px;
    }
    .welcome h2 {
      font-size: 1.5rem;
      color: var(--text-bright);
      margin-bottom: 12px;
    }
    .welcome p {
      font-size: 0.9rem;
      line-height: 1.6;
      max-width: 400px;
    }
    .welcome .shortcut {
      margin-top: 24px;
      font-size: 0.78rem;
      color: var(--text-dim);
    }
    .welcome kbd {
      padding: 2px 8px;
      background: var(--bg-active);
      border-radius: 4px;
      font-family: var(--font);
      font-size: 0.75rem;
      border: 1px solid var(--border);
    }

    /* Save indicator */
    .save-status {
      font-size: 0.72rem;
      padding: 2px 8px;
      border-radius: 10px;
      transition: all 0.3s;
    }
    .save-status.saving { background: var(--accent-dim); color: #fff; }
    .save-status.saved { background: var(--success); color: #1a1b26; }
    .save-status.unsaved { color: var(--danger); }

    /* Modal */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }
    .modal-overlay.show { display: flex; }
    .modal {
      background: var(--bg-sidebar);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
      width: 400px;
      max-width: 90vw;
    }
    .modal h3 {
      margin-bottom: 16px;
      color: var(--text-bright);
    }
    .modal input, .modal select {
      width: 100%;
      padding: 10px 14px;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 0.85rem;
      outline: none;
      margin-bottom: 12px;
    }
    .modal input:focus, .modal select:focus { border-color: var(--accent); }
    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 8px;
    }

    /* Toggle sidebar button */
    .toggle-sidebar {
      background: var(--bg-input);
      border: 1px solid var(--border);
      color: var(--text-dim);
      padding: 6px 10px;
      border-radius: var(--radius);
      cursor: pointer;
      font-size: 0.9rem;
      transition: all 0.2s;
    }
    .toggle-sidebar:hover { color: var(--accent); border-color: var(--accent); }

    /* Export button */
    .export-btn {
      position: fixed;
      bottom: 20px;
      right: 20px;
      z-index: 10;
      opacity: 0.7;
      transition: opacity 0.2s;
    }
    .export-btn:hover { opacity: 1; }

    /* Responsive */
    @media (max-width: 768px) {
      .sidebar { width: 280px; min-width: 280px; position: absolute; z-index: 50; height: 100%; }
      .sidebar.collapsed { margin-left: -280px; }
      .title-input { min-width: 100px; max-width: 200px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <h1>📝 Doc Editor</h1>
        <div class="search-box">
          <input type="text" id="searchInput" placeholder="Search documents..." />
        </div>
      </div>
      <div class="sidebar-actions">
        <button class="btn btn-accent" onclick="createDoc()">＋ New Doc</button>
        <div class="btn-flex">
          <button class="btn btn-sm" onclick="exportEncryptedDocs()">📦 Export (Encrypted)</button>
          <button class="btn btn-sm" onclick="exportPlainJson()">📄 Export (JSON)</button>
          <button class="btn btn-sm" onclick="importDocs()">📥 Import</button>
        </div>
      </div>
      <div class="category-filters" id="categoryFilters"></div>
      <div class="doc-list" id="docList"></div>
    </aside>

    <!-- Main -->
    <main class="main">
      <!-- Welcome screen -->
      <div class="welcome" id="welcome">
        <h2>Welcome to Doc Editor</h2>
        <p>A simple, local-first text editor. Your documents are saved in a SQLite database — no cloud, no tracking.</p>
        <div class="shortcut">
          Click <kbd>New Doc</kbd> to get started
        </div>
        <!-- Theme selector always visible -->
        <div style="margin-top: 24px;">
          <label style="font-size: 0.8rem; color: var(--text-dim); display: block; margin-bottom: 8px;">🎨 Theme</label>
          <select class="theme-select" id="themeSelect" onchange="changeTheme(this.value)" style="max-width: 260px;">
            <optgroup label="── Dark ──">
              <option value="tokyo-night">🌙 Tokyo Night</option>
              <option value="nord">❄️ Nord</option>
              <option value="dracula">🧛 Dracula</option>
              <option value="solarized-dark">🌊 Solarized Dark</option>
              <option value="catppuccin-mocha">☕ Catppuccin Mocha</option>
              <option value="one-dark">⚛️ One Dark</option>
              <option value="gruvbox-dark">🟧 Gruvbox Dark</option>
              <option value="monokai-pro">🎨 Monokai Pro</option>
              <option value="synthwave">🌆 Synthwave '84</option>
              <option value="github-dark">🐙 GitHub Dark</option>
              <option value="oceanic-next">🌊 Oceanic Next</option>
            </optgroup>
            <optgroup label="── Light ──">
              <option value="tokyo-night-light">🌙 Tokyo Night Light</option>
              <option value="nord-light">❄️ Nord Light</option>
              <option value="dracula-light">🧛 Dracula Light</option>
              <option value="solarized-light">🌊 Solarized Light</option>
              <option value="catppuccin-latte">☕ Catppuccin Latte</option>
              <option value="one-light">⚛️ One Light</option>
              <option value="gruvbox-light">🟧 Gruvbox Light</option>
              <option value="monokai-pro-light">🎨 Monokai Pro Light</option>
              <option value="synthwave-light">🌆 Synthwave Light</option>
              <option value="github-light">🐙 GitHub Light</option>
              <option value="oceanic-light">🌊 Oceanic Light</option>
            </optgroup>
          </select>
        </div>
      </div>

      <!-- Editor (hidden initially) -->
      <div style="display:none; flex-direction:column; flex:1; overflow:hidden;" id="editorContainer">
        <div class="toolbar">
          <div class="toolbar-left">
            <button class="toggle-sidebar" onclick="toggleSidebar()" title="Toggle sidebar">☰</button>
            <input type="text" class="title-input" id="titleInput" placeholder="Document title..." />
            <select class="category-select" id="categorySelect">
              <option value="general">General</option>
              <option value="notes">Notes</option>
              <option value="work">Work</option>
              <option value="personal">Personal</option>
              <option value="ideas">Ideas</option>
              <option value="code">Code</option>
              <option value="writing">Writing</option>
              <option value="other">Other</option>
            </select>
            <select class="theme-select" id="themeSelectEditor" onchange="changeTheme(this.value)" style="max-width: 220px;">
              <optgroup label="── Dark ──">
                <option value="tokyo-night">🌙 Tokyo Night</option>
                <option value="nord">❄️ Nord</option>
                <option value="dracula">🧛 Dracula</option>
                <option value="solarized-dark">🌊 Solarized Dark</option>
                <option value="catppuccin-mocha">☕ Catppuccin Mocha</option>
                <option value="one-dark">⚛️ One Dark</option>
                <option value="gruvbox-dark">🟧 Gruvbox Dark</option>
                <option value="monokai-pro">🎨 Monokai Pro</option>
                <option value="synthwave">🌆 Synthwave '84</option>
                <option value="github-dark">🐙 GitHub Dark</option>
                <option value="oceanic-next">🌊 Oceanic Next</option>
              </optgroup>
              <optgroup label="── Light ──">
                <option value="tokyo-night-light">🌙 Tokyo Night Light</option>
                <option value="nord-light">❄️ Nord Light</option>
                <option value="dracula-light">🧛 Dracula Light</option>
                <option value="solarized-light">🌊 Solarized Light</option>
                <option value="catppuccin-latte">☕ Catppuccin Latte</option>
                <option value="one-light">⚛️ One Light</option>
                <option value="gruvbox-light">🟧 Gruvbox Light</option>
                <option value="monokai-pro-light">🎨 Monokai Pro Light</option>
                <option value="synthwave-light">🌆 Synthwave Light</option>
                <option value="github-light">🐙 GitHub Light</option>
                <option value="oceanic-light">🌊 Oceanic Light</option>
              </optgroup>
            </select>
          </div>
          <div class="toolbar-right">
            <span class="save-status" id="saveStatus">—</span>
            <span class="meta-info" id="metaInfo"></span>
            <span class="char-count" id="charCount"></span>
            <button class="btn btn-sm" onclick="saveDoc()">💾 Save</button>
          </div>
        </div>
        <div class="editor-area">
          <textarea class="editor-textarea" id="contentArea" placeholder="Start writing..."></textarea>
        </div>
      </div>
    </main>
  </div>

  <!-- Quick delete confirmation modal -->
  <div class="modal-overlay" id="deleteModal">
    <div class="modal">
      <h3>🗑️ Delete Document?</h3>
      <p style="color:var(--text-dim); font-size:0.85rem; margin-bottom:16px;">This action cannot be undone.</p>
      <div class="modal-actions">
        <button class="btn" onclick="closeDeleteModal()">Cancel</button>
        <button class="btn btn-danger" onclick="confirmDelete()">Delete</button>
      </div>
    </div>
  </div>

  <!-- Hidden file input for import -->

  <script>
    let documents = [];
    let currentDoc = null;
    let activeCategory = 'all';
    let saveTimeout = null;
    let docIdCounter = 0;
    let pendingDeleteId = null;

    // ---- Theme Management ----
    function changeTheme(themeName) {
      document.documentElement.setAttribute('data-theme', themeName);
      localStorage.setItem('doc-editor-theme', themeName);
      // Sync both selects
      const s1 = document.getElementById('themeSelect');
      const s2 = document.getElementById('themeSelectEditor');
      if (s1) s1.value = themeName;
      if (s2) s2.value = themeName;
    }

    function initTheme() {
      const saved = localStorage.getItem('doc-editor-theme') || 'tokyo-night';
      document.documentElement.setAttribute('data-theme', saved);
      const s1 = document.getElementById('themeSelect');
      const s2 = document.getElementById('themeSelectEditor');
      if (s1) s1.value = saved;
      if (s2) s2.value = saved;
    }

    // ---- Data ----
    async function fetchDocs() {
      const params = new URLSearchParams();
      if (activeCategory !== 'all') params.set('category', activeCategory);
      const search = document.getElementById('searchInput').value;
      if (search) params.set('search', search);

      const res = await fetch(`/api/documents?${params}`);
      documents = await res.json();
      renderDocList();
    }

    async function fetchCategories() {
      const res = await fetch('/api/categories');
      const cats = await res.json();
      const container = document.getElementById('categoryFilters');
      container.innerHTML = `<span class="cat-tag ${activeCategory === 'all' ? 'active' : ''}" onclick="filterCategory('all')">All</span>`;
      for (const cat of cats) {
        container.innerHTML += `<span class="cat-tag ${activeCategory === cat ? 'active' : ''}" onclick="filterCategory('${cat}')">${cat}</span>`;
      }
    }

    // ---- Rendering ----
    function renderDocList() {
      const list = document.getElementById('docList');
      if (documents.length === 0) {
        list.innerHTML = `<div style="padding:20px; text-align:center; color:var(--text-dim); font-size:0.82rem;">
          ${documents.length === 0 && activeCategory === 'all' ? 'No documents yet.<br>Create one with <b>+ New Doc</b>' : 'No documents in this category.'}
        </div>`;
        return;
      }
      list.innerHTML = documents.map(doc => {
        const preview = doc.content.substring(0, 80).replace(/\n/g, ' ');
        const date = new Date(doc.updated_at).toLocaleDateString('en-US', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
        const isActive = currentDoc && currentDoc.id === doc.id;
        return `
          <div class="doc-item ${isActive ? 'active' : ''}">
            <div class="doc-item-wrapper">
              <div class="doc-item-info" onclick="openDoc(${doc.id})">
                <div class="doc-item-title">${escapeHtml(doc.title)}</div>
                <div class="doc-item-meta">
                  <span>${date}</span>
                  <span class="doc-item-cat">${escapeHtml(doc.category || 'general')}</span>
                </div>
                <div class="doc-item-preview">${escapeHtml(preview)}</div>
              </div>
              <button class="doc-item-delete" onclick="event.stopPropagation(); quickDelete(${doc.id})" title="Delete document">🗑️</button>
            </div>
          </div>
        `;
      }).join('');
    }

    // ---- Encryption (AES-GCM + PBKDF2) ----
    async function deriveKey(password, salt) {
      const enc = new TextEncoder();
      const keyMaterial = await crypto.subtle.importKey(
        'raw', enc.encode(password), 'PBKDF2', false, ['deriveKey']
      );
      return crypto.subtle.deriveKey(
        { name: 'PBKDF2', salt, iterations: 100000, hash: 'SHA-256' },
        keyMaterial, { name: 'AES-GCM', length: 256 }, false, ['encrypt', 'decrypt']
      );
    }

    async function encryptData(data, password) {
      const enc = new TextEncoder();
      const salt = crypto.getRandomValues(new Uint8Array(16));
      const iv = crypto.getRandomValues(new Uint8Array(12));
      const key = await deriveKey(password, salt);
      const encrypted = await crypto.subtle.encrypt({ name: 'AES-GCM', iv }, key, enc.encode(JSON.stringify(data)));
      // Pack: salt(16) + iv(12) + ciphertext
      const packed = new Uint8Array(salt.length + iv.length + encrypted.byteLength);
      packed.set(salt, 0);
      packed.set(iv, salt.length);
      packed.set(new Uint8Array(encrypted), salt.length + iv.length);
      return packed;
    }

    async function decryptData(packed, password) {
      const salt = packed.slice(0, 16);
      const iv = packed.slice(16, 28);
      const data = packed.slice(28);
      const key = await deriveKey(password, salt);
      const decrypted = await crypto.subtle.decrypt({ name: 'AES-GCM', iv }, key, data);
      const dec = new TextDecoder();
      return JSON.parse(dec.decode(decrypted));
    }

    async function exportEncryptedDocs() {
      const password = prompt('Enter encryption password:');
      if (!password) return;

      const res = await fetch('/api/export');
      const docs = await res.json();

      try {
        const encrypted = await encryptData(docs, password);
        const blob = new Blob([encrypted], { type: 'application/octet-stream' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `doc-editor-backup-${new Date().toISOString().split('T')[0]}.enc`;
        a.click();
        URL.revokeObjectURL(url);
      } catch (e) {
        alert('Export failed: ' + e.message);
      }
    }

    async function importDocs() {
      const password = prompt('Enter decryption password:');
      if (!password) return;

      const input = document.createElement('input');
      input.type = 'file';
      input.accept = '.enc,.json';
      input.onchange = async (e) => {
        const file = e.target.files[0];
        if (!file) return;

        try {
          const buffer = await file.arrayBuffer();
          const packed = new Uint8Array(buffer);
          let docs;

          // Try to decrypt first (encrypted format)
          try {
            docs = await decryptData(packed, password);
          } catch {
            // If decryption fails, try reading as plain JSON
            const text = new TextDecoder().decode(packed);
            docs = JSON.parse(text);
          }

          // Import each document
          for (const doc of docs) {
            await fetch('/api/documents', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                title: doc.title || 'Imported Document',
                content: doc.content || '',
                category: doc.category || 'general'
              })
            });
          }

          await fetchDocs();
          fetchCategories();
          alert(`Imported ${docs.length} document(s)`);
        } catch (err) {
          alert('Import failed: wrong password or invalid file');
        }
      };
      input.click();
    }

    async function createDoc() {
      const res = await fetch('/api/documents', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          title: 'Untitled Document',
          content: '',
          category: activeCategory !== 'all' ? activeCategory : 'general'
        })
      });
      const doc = await res.json();
      await fetchDocs();
      openDoc(doc.id);
    }

    function openDoc(id) {
      const doc = documents.find(d => d.id === id);
      if (!doc) return;
      currentDoc = doc;
      document.getElementById('welcome').style.display = 'none';
      const editor = document.getElementById('editorContainer');
      editor.style.display = 'flex';

      document.getElementById('titleInput').value = doc.title;
      document.getElementById('contentArea').value = doc.content;
      document.getElementById('categorySelect').value = doc.category || 'general';
      document.getElementById('charCount').textContent = `${doc.content.length} chars`;
      document.getElementById('saveStatus').textContent = '✓ saved';
      document.getElementById('saveStatus').className = 'save-status saved';
      const date = new Date(doc.updated_at).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
      document.getElementById('metaInfo').textContent = date;

      renderDocList();
      document.getElementById('contentArea').focus();
    }

    async function saveDoc() {
      if (!currentDoc) return;
      const title = document.getElementById('titleInput').value;
      const content = document.getElementById('contentArea').value;
      const category = document.getElementById('categorySelect').value;

      document.getElementById('saveStatus').textContent = 'saving...';
      document.getElementById('saveStatus').className = 'save-status saving';

      await fetch(`/api/documents/${currentDoc.id}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ title, content, category })
      });

      currentDoc.title = title;
      currentDoc.content = content;
      currentDoc.category = category;
      currentDoc.updated_at = new Date().toISOString();

      document.getElementById('saveStatus').textContent = '✓ saved';
      document.getElementById('saveStatus').className = 'save-status saved';
      document.getElementById('charCount').textContent = `${content.length} chars`;
      renderDocList();

      setTimeout(() => {
        document.getElementById('saveStatus').textContent = '—';
        document.getElementById('saveStatus').className = 'save-status';
      }, 2000);
    }

    function autoSave() {
      document.getElementById('saveStatus').textContent = '●';
      document.getElementById('saveStatus').className = 'save-status unsaved';
      clearTimeout(saveTimeout);
      saveTimeout = setTimeout(saveDoc, 1000);
    }

    function closeDeleteModal() {
      document.getElementById('deleteModal').classList.remove('show');
    }

    async function confirmDelete() {
      const id = pendingDeleteId || (currentDoc && currentDoc.id);
      if (!id) return;

      await fetch(`/api/documents/${id}`, { method: 'DELETE' });
      pendingDeleteId = null;

      if (currentDoc && currentDoc.id === id) {
        currentDoc = null;
        document.getElementById('editorContainer').style.display = 'none';
        document.getElementById('welcome').style.display = 'flex';
      }
      await fetchDocs();
    }

    async function quickDelete(id) {
      pendingDeleteId = id;
      document.getElementById('deleteModal').classList.add('show');
    }
      if (currentDoc && currentDoc.id === id) {
        currentDoc = null;
        document.getElementById('editorContainer').style.display = 'none';
        document.getElementById('welcome').style.display = 'flex';
      }
      await fetchDocs();
    }

    function filterCategory(cat) {
      activeCategory = cat;
      fetchDocs();
      fetchCategories();
    }

    function toggleSidebar() {
      document.getElementById('sidebar').classList.toggle('collapsed');
    }

    async function exportPlainJson() {
      const res = await fetch('/api/export');
      const docs = await res.json();
      const blob = new Blob([JSON.stringify(docs, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `doc-editor-backup-${new Date().toISOString().split('T')[0]}.json`;
      a.click();
      URL.revokeObjectURL(url);
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // ---- Events ----
    document.getElementById('titleInput').addEventListener('input', autoSave);
    document.getElementById('contentArea').addEventListener('input', () => {
      autoSave();
      document.getElementById('charCount').textContent = `${document.getElementById('contentArea').value.length} chars`;
    });
    document.getElementById('searchInput').addEventListener('input', () => {
      fetchDocs();
    });
    document.getElementById('deleteModal').addEventListener('click', (e) => {
      if (e.target === document.getElementById('deleteModal')) closeDeleteModal();
    });

    // Keyboard shortcuts
    document.addEventListener('keydown', (e) => {
      if ((e.ctrlKey || e.metaKey) && e.key === 's') {
        e.preventDefault();
        saveDoc();
      }
      if ((e.ctrlKey || e.metaKey) && e.key === 'n') {
        e.preventDefault();
        createDoc();
      }
      if ((e.ctrlKey || e.metaKey) && e.key === 'b') {
        e.preventDefault();
        toggleSidebar();
      }
    });

    // ---- Init ----
    initTheme();

    // Auto-open last document or create new one
    async function initAfterDocs() {
      fetchDocs();
      fetchCategories();

      const savedLast = localStorage.getItem('doc-editor-last-id');
      if (savedLast) {
        const doc = documents.find(d => d.id === parseInt(savedLast));
        if (doc) {
          setTimeout(() => openDoc(doc.id), 200);
          return;
        }
      }
      if (documents.length === 0) {
        setTimeout(() => createDoc(), 200);
      }
    }

    // Override fetchDocs to also trigger auto-open
    const origFetchDocs = fetchDocs;
    fetchDocs = async function() {
      await origFetchDocs();
      const savedLast = localStorage.getItem('doc-editor-last-id');
      if (savedLast) {
        const doc = documents.find(d => d.id === parseInt(savedLast));
        if (doc) {
          setTimeout(() => openDoc(doc.id), 200);
          return;
        }
      }
      if (documents.length === 0) {
        setTimeout(() => createDoc(), 200);
      }
    };

    initAfterDocs();

    // Save last opened doc ID
    const origOpenDoc = openDoc;
    openDoc = function(id) {
      origOpenDoc(id);
      localStorage.setItem('doc-editor-last-id', id);
    };
  </script>
</body>
